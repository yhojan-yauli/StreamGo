name: StreamGo CI

on:
  push:
    branches:
      - main
      - backend

  pull_request:
    branches:
      - main
      - backend

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Dar permisos a Gradle
        run: chmod +x StreamGo-backend/gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Compila y ejecuta tests
      - name: Compilar y testear
        working-directory: StreamGo-backend
        run: ./gradlew build

  # Fusiona automáticamente el PR hacia la rama destino (backend o main) si la compilación fue exitosa
  auto-merge:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && success()
    steps:
      - name: Fusionar PR automáticamente
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              merge_method: 'squash'
            })
