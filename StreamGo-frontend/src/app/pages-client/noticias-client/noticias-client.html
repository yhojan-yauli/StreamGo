<app-navbar-client></app-navbar-client>
<main class="noticias-main"><section class="noticias-header"><h1>Noticias y comunidad</h1><p>Mira novedades, comparte publicaciones y reacciona al contenido de StreamGO.</p><button type="button" class="btn-publicar" (click)="abrirFormulario()">+ Publicar noticia</button></section><section class="alert-box success" *ngIf="mensaje">{{ mensaje }}</section><section class="alert-box error" *ngIf="error">{{ error }}</section><section class="loading-box" *ngIf="cargando">Cargando noticias...</section><section class="noticias-page" *ngIf="!cargando"><article class="post-noticia" *ngFor="let noticia of noticias"><div class="post-media"><div class="post-placeholder"><span>STREAMGO</span></div><button type="button" class="play-trailer" (click)="abrirTrailer(noticia.trailer)"><span>▷</span><strong>Ver tráiler</strong></button></div><div class="post-info"><small>Publicado por {{ autor(noticia) }}</small><h2>{{ noticia.titulo }}</h2><p>{{ noticia.contenido }}</p><div class="post-actions"><button type="button" [disabled]="reaccionandoId === noticia.idPost" (click)="reaccionar(noticia)">❤ {{ noticia.reacciones || 0 }}</button><button type="button" (click)="compartir(noticia)">↗</button><span *ngIf="noticia.fijado">📌 Fijado</span></div></div></article></section><section class="empty-box" *ngIf="!cargando && noticias.length === 0">No hay noticias disponibles.</section></main><div class="modal-noticia-backdrop" *ngIf="mostrarFormulario"><section class="modal-noticia"><button type="button" class="cerrar-modal" (click)="cerrarFormulario()">✖</button><h2>Nueva publicación</h2><div class="form-group"><label>Título</label><input type="text" [(ngModel)]="noticiaForm.titulo" placeholder="Ej. Nuevo estreno disponible"></div><div class="form-group"><label>Contenido</label><textarea rows="5" [(ngModel)]="noticiaForm.contenido" placeholder="Escribe el contenido de la noticia"></textarea></div><div class="form-group"><label>Tráiler URL</label><input type="text" [(ngModel)]="noticiaForm.trailer" placeholder="https://..."></div><button type="button" class="btn-guardar" [disabled]="publicando" (click)="publicarNoticia()">{{ publicando ? 'Publicando...' : 'Publicar' }}</button></section></div>
