<app-navbar-client></app-navbar-client>

<main class="noticias-main">
  <section class="noticias-toolbar" aria-label="Filtros de noticias">
    <label class="search-box">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="11" cy="11" r="7"></circle>
        <path d="m20 20-3.5-3.5"></path>
      </svg>
      <input
        type="search"
        [(ngModel)]="busqueda"
        placeholder="Buscar noticias..."
        autocomplete="off"
      >
    </label>

    <div class="filter-group" role="tablist" aria-label="Orden de noticias">
      <button
        type="button"
        *ngFor="let filtro of filtros"
        [class.active]="filtroActivo === filtro.valor"
        (click)="seleccionarFiltro(filtro.valor)"
      >
        {{ filtro.etiqueta }}
      </button>
    </div>
  </section>

  <section class="noticias-header">
    <h1>Noticias y comunidad</h1>
    <p>Mira novedades y reacciona al contenido de StreamGO.</p>
  </section>

  <section class="alert-box success" *ngIf="mensaje">{{ mensaje }}</section>
  <section class="alert-box error" *ngIf="error">{{ error }}</section>
  <section class="loading-box" *ngIf="cargando">Cargando noticias...</section>

  <section class="noticias-grid" *ngIf="!cargando && noticiasFiltradas.length > 0">
    <article class="noticia-card" *ngFor="let noticia of noticiasFiltradas; trackBy: trackByNoticia">
      <div class="card-media">
        <div class="media-fallback">
          <span>STREAMGO</span>
        </div>

        <span class="reactions-pill">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.08A6.1 6.1 0 0 1 16.5 3C19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54z"></path>
          </svg>
          {{ noticia.reacciones || 0 }}
        </span>
      </div>

      <div class="card-body">
        <div class="card-meta">
          <span>{{ autor(noticia) }}</span>
          <span class="sg-badge info" *ngIf="noticia.fijado">Fijado</span>
        </div>

        <h2>{{ noticia.titulo }}</h2>
        <p>{{ noticia.contenido }}</p>

        <div class="card-actions">
          <button
            type="button"
            class="reaction-btn"
            [disabled]="reaccionandoId === noticia.idPost"
            (click)="reaccionar(noticia)"
            aria-label="Reaccionar"
          >
            <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.08A6.1 6.1 0 0 1 16.5 3C19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54z"></path>
            </svg>
            {{ noticia.reacciones || 0 }}
          </button>

          <button
            type="button"
            class="trailer-btn"
            *ngIf="noticia.trailer"
            (click)="abrirTrailer(noticia.trailer)"
          >
            Ver tráiler
          </button>

          <button
            type="button"
            class="share-btn"
            (click)="compartir(noticia)"
            aria-label="Compartir"
          >
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9">
              <circle cx="18" cy="5" r="3"></circle>
              <circle cx="6" cy="12" r="3"></circle>
              <circle cx="18" cy="19" r="3"></circle>
              <path d="m8.6 13.5 6.8 4"></path>
              <path d="m15.4 6.5-6.8 4"></path>
            </svg>
          </button>
        </div>
      </div>
    </article>
  </section>

  <section class="empty-box" *ngIf="!cargando && noticiasFiltradas.length === 0">
    No hay noticias disponibles.
  </section>
</main>
