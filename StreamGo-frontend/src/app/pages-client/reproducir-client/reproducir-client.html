<app-navbar-client></app-navbar-client>
<main class="repro-page">
  <section class="repro-grid">
    <app-video-player [videoUrl]="videoUrl" [titulo]="titulo()"></app-video-player>
    <aside class="info-video">
      <h2>{{ titulo() }}</h2><small>{{ contenido?.categoria || 'StreamGO' }}</small><p>{{ descripcion() }}</p>
      <div class="meta-video"><span>{{ contenido?.tipoContenido || 'Contenido' }}</span><span>⭐ {{ contenido?.promedioCalificacion || 0 }}</span><span>▶ {{ contenido?.totalReproducciones || 0 }}</span></div>
      <button type="button" class="btn-mas" routerLink="/client/home">Ver más</button><span class="info-circle">i</span>
    </aside>
  </section>
  <section class="relacionados" *ngIf="relacionados.length > 0"><h2>Relacionados</h2><div class="relacionados-grid"><article class="relacionado-card" *ngFor="let item of relacionados" (click)="verRelacionado(item)"><img [src]="imagen(item)" [alt]="item.titulo"><h3>{{ item.titulo }}</h3></article></div></section>
</main>
