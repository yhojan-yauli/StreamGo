<button class="menu-toggle" type="button" (click)="toggleSidebar()">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18"/><path d="M3 6h18"/><path d="M3 18h18"/></svg>
</button>

<aside class="sidebar-admin" [class.sidebar-collapsed]="sidebarCollapsed" [class.sidebar-hidden]="!sidebarAbierto && isMobile">
  <button class="collapse-btn" type="button" (click)="toggleCollapse()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
  </button>

  <div class="sidebar-head">
    <div class="sidebar-avatar">
      <span>A</span>
    </div>
    <div class="sidebar-user">
      <span class="user-label">Panel Admin</span>
      <span class="user-name">StreamGO</span>
    </div>
  </div>

  <nav class="sidebar-nav">
    <div class="menu-group">
      <span class="menu-title">Main</span>
      <ul>
        <li routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
          <a routerLink="/admin/home">
            <span class="nav-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            </span>
            <span class="nav-text">Home</span>
            <span class="nav-tooltip">Home</span>
          </a>
        </li>
        <li routerLinkActive="active">
          <a routerLink="/admin/usuarios">
            <span class="nav-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            </span>
            <span class="nav-text">Gestion de usuarios</span>
            <span class="nav-tooltip">Usuarios</span>
          </a>
        </li>
        <li routerLinkActive="active">
          <a routerLink="/admin/contenido">
            <span class="nav-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="2" width="20" height="20" rx="2.18"/><path d="M8 2v20"/><path d="M16 2v20"/><path d="M2 12h20"/></svg>
            </span>
            <span class="nav-text">Gestion de contenido</span>
            <span class="nav-tooltip">Contenido</span>
          </a>
        </li>
        <li routerLinkActive="active">
          <a routerLink="/admin/noticias">
            <span class="nav-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-4 0v-9"/><path d="M10 7h6"/><path d="M10 11h6"/><path d="M10 15h4"/></svg>
            </span>
            <span class="nav-text">Noticias / Comunidad</span>
            <span class="nav-tooltip">Noticias</span>
          </a>
        </li>
        <li routerLinkActive="active">
          <a routerLink="/admin/peticiones">
            <span class="nav-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            </span>
            <span class="nav-text">Peticiones</span>
            <span class="nav-tooltip">Peticiones</span>
          </a>
        </li>
      </ul>
    </div>

    <div class="menu-group">
      <span class="menu-title">Gestion</span>
      <ul>
        <li routerLinkActive="active">
          <a routerLink="/admin/planes">
            <span class="nav-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="1" y="4" width="22" height="16" rx="2"/><path d="M1 10h22"/></svg>
            </span>
            <span class="nav-text">Planes</span>
            <span class="nav-tooltip">Planes</span>
          </a>
        </li>
        <li routerLinkActive="active">
          <a routerLink="/admin/suscripciones">
            <span class="nav-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            </span>
            <span class="nav-text">Suscripciones</span>
            <span class="nav-tooltip">Suscripciones</span>
          </a>
        </li>
      </ul>
    </div>
  </nav>

  <div class="sidebar-footer">
    <a class="logout-link" (click)="logout()">
      <span class="nav-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </span>
      <span class="nav-text">Cerrar sesion</span>
      <span class="nav-tooltip">Salir</span>
    </a>
  </div>
</aside>
