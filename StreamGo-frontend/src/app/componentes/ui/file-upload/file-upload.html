<div class="fu-group">
  <label class="fu-label">{{ label }}</label>
  <div
    class="fu-zone"
    [class.fu-dragover]="dragOver"
    [class.fu-has-file]="!!selectedFile || !!previewUrl"
    [class.fu-compact]="compact"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)"
    (click)="triggerClick()"
  >
    <input #fileInput type="file" [accept]="accept" (change)="onFileSelect($event)" hidden>

    <ng-container *ngIf="!selectedFile && !previewUrl; else hasFile">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#7b4cff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <span class="fu-placeholder">Arrastra o haz clic para subir</span>
    </ng-container>

    <ng-template #hasFile>
      <img *ngIf="previewUrl" [src]="previewUrl" class="fu-preview" alt="preview">
      <svg *ngIf="!previewUrl && fileName" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#7b4cff" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span class="fu-filename" *ngIf="fileName">{{ fileName }}</span>
    </ng-template>
  </div>

  <div class="fu-progress-wrap" *ngIf="uploading">
    <div class="fu-progress-bar">
      <div class="fu-progress-fill" [style.width.%]="progress"></div>
    </div>
    <span class="fu-progress-text">{{ progress }}%</span>
  </div>
</div>
