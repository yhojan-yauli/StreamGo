<div class="alert-container" *ngIf="alerts.length">
  <div
    *ngFor="let alert of alerts"
    class="alert-toast"
    [class.alert-success]="alert.type === 'success'"
    [class.alert-error]="alert.type === 'error'"
    [class.alert-warning]="alert.type === 'warning'"
    [class.alert-info]="alert.type === 'info'"
    (click)="removeAlert(alert.id)"
  >
    <svg class="alert-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path *ngIf="alert.type === 'success'" d="M20 6L9 17l-5-5"/>
      <path *ngIf="alert.type === 'error'" d="M18 6L6 18M6 6l12 12"/>
      <path *ngIf="alert.type === 'warning'" d="M12 9v4M12 17h.01"/>
      <path *ngIf="alert.type === 'info'" d="M12 16v-4M12 8h.01"/>
      <circle *ngIf="alert.type === 'info'" cx="12" cy="12" r="10"/>
    </svg>
    <span class="alert-text">{{ alert.text }}</span>
  </div>
</div>
