<div class="dialog-backdrop" *ngIf="visible" (click)="onBackdropClick($event)">
  <div class="dialog-panel" [class.dialog-danger]="variant === 'danger'">
    <div class="dialog-header">
      <svg class="dialog-icon" *ngIf="variant === 'danger'" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ff4f6d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
      <svg class="dialog-icon" *ngIf="variant === 'default'" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#7b4cff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
      </svg>
      <h3 class="dialog-title">{{ title }}</h3>
    </div>
    <p class="dialog-message">{{ message }}</p>
    <div class="dialog-actions">
      <button class="dialog-btn dialog-btn-cancel" type="button" (click)="cancel()">{{ cancelText }}</button>
      <button class="dialog-btn dialog-btn-confirm" [class.dialog-btn-danger]="variant === 'danger'" type="button" (click)="confirm()">{{ confirmText }}</button>
    </div>
  </div>
</div>
