<div class="vp-container">
  <iframe
    *ngIf="tipo === 'youtube' && safeUrl"
    [src]="safeUrl"
    [title]="titulo"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen
  ></iframe>

  <div class="vp-custom" *ngIf="tipo === 'directo'"
       (mouseenter)="showControls()"
       (mouseleave)="hideControls()"
       (mousemove)="showControls()">

    <video
      #videoPlayer
      [src]="videoUrlFinal"
      playsinline
      preload="metadata"
      (loadedmetadata)="onVideoInit(videoPlayer)"
      (mousedown)="onMouseDown($event)"
      (mouseup)="onMouseUp($event)"
      (mousemove)="onMouseMove($event)"
    >
      Tu navegador no soporta este formato de video.
    </video>

    <!-- Botón central de play -->
    <div class="vp-center-play" *ngIf="!isPlaying && !cargando && !error" (click)="togglePlay(); $event.stopPropagation()">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    </div>

    <!-- ÚNICO INDICADOR DE CARGA (solo se muestra cuando cargando es true y no está reproduciendo) -->
    <div class="vp-buffer-indicator" *ngIf="cargando && !isPlaying">
      <span class="vp-buffer-spinner"></span>
      <span>Cargando video...</span>
      <span class="vp-buffer-percent" *ngIf="bufferedPercent > 0">{{ bufferedPercent | number:'1.0-0' }}%</span>
    </div>

    <!-- Controles -->
    <div class="vp-controls-overlay" [class.visible]="controlsVisible" (click)="$event.stopPropagation()">
      <div class="vp-progress-wrap">
        <div class="vp-buffer-segments">
          <div
            *ngFor="let segment of getBufferedSegments()"
            class="vp-buffer-segment"
            [style.left]="segment.left"
            [style.width]="segment.width">
          </div>
        </div>

        <input type="range" class="vp-progress" min="0" max="100" [value]="progress" (input)="seek($event)" (click)="$event.stopPropagation()">

        <div class="vp-progress-fill" [style.width.%]="progress"></div>
      </div>

      <div class="vp-controls-row">
        <div class="vp-controls-left">
          <button type="button" class="vp-btn" (click)="togglePlay(); $event.stopPropagation()" [title]="isPlaying ? 'Pausar' : 'Reproducir'">
            <svg *ngIf="isPlaying" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
            <svg *ngIf="!isPlaying" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </button>

          <button type="button" class="vp-btn" (click)="toggleMute(); $event.stopPropagation()" [title]="isMuted ? 'Activar sonido' : 'Silenciar'">
            <svg *ngIf="isMuted || volume === 0" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
            <svg *ngIf="!isMuted && volume > 0 && volume <= 0.5" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            <svg *ngIf="!isMuted && volume > 0.5" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
          </button>

          <input type="range" class="vp-volume" min="0" max="1" step="0.05" [value]="volume" (input)="setVolume($event)" (click)="$event.stopPropagation()">

          <span class="vp-time">{{ formatTime(currentTime) }} / {{ formatTime(duration) }}</span>
        </div>

        <div class="vp-controls-right">
          <!-- CALIDAD -->
          <div class="vp-quality-wrapper">
            <button type="button" class="vp-btn vp-quality-btn" (click)="toggleQualityMenu(); $event.stopPropagation()" title="Calidad">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
              <span class="vp-quality-label">{{ getCurrentQualityLabel() }}</span>
            </button>
            <div class="vp-quality-menu" *ngIf="showQualityMenu" (click)="$event.stopPropagation()">
              <button *ngFor="let level of qualityLevels" (click)="setQualityLevel(level); $event.stopPropagation()" [class.active]="currentQuality === level">
                {{ level }}
              </button>
            </div>
          </div>

          <!-- PIP -->
          <button type="button" class="vp-btn" (click)="togglePip(); $event.stopPropagation()" [class.active]="isPipActive" title="Modo flotante">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v14c0 1.1.9 2 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M16 13h5v6h-5z"/><path d="M13 8l6-6"/><path d="M19 2h-4"/><path d="M19 2v4"/></svg>
          </button>

          <!-- FULLSCREEN -->
          <button type="button" class="vp-btn" (click)="toggleFullscreen(); $event.stopPropagation()" title="Pantalla completa">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Mensaje de error o formato no soportado -->
  <div class="vp-empty" *ngIf="tipo === 'none' && !cargando">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M10 9l5 3-5 3V9z"/></svg>
    <span>{{ error || 'Video no disponible.' }}</span>
  </div>
</div>
