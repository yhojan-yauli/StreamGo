<app-navbar-public [showAuthButtons]="false"></app-navbar-public>

<main class="auth-page">
  <img src="/logo.png" class="logo-auth" alt="StreamGO">

  <section class="auth-box">
    <div *ngIf="mensajeInfo" style="color: #155724; background-color: #d4edda; border: 1px solid #c3e6cb; padding: 12px; margin-bottom: 20px; border-radius: 6px; font-size: 0.9rem; text-align: center;">
  {{ mensajeInfo }}
</div>

<div *ngIf="mensajeError" style="color: #721c24; background-color: #f8d7da; border: 1px solid #f5c6cb; padding: 12px; margin-bottom: 20px; border-radius: 6px; font-size: 0.9rem; text-align: center;">
  {{ mensajeError }}
</div>
    <h1>Iniciar Sesión</h1>

    <form (ngSubmit)="login()">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" name="email" placeholder="usuario@gmail.com" required>

      <label>Password</label>
      <input type="password" [(ngModel)]="password" name="password" placeholder="********" required>

      <button class="btn-morado" type="submit">Iniciar Sesión</button>
    </form>

    <div class="oauth-container">
      <hr>
      <button type="button" (click)="loginConGoogle()" class="btn-google" style="display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="20px" height="20px">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.5 24c0-1.61-.15-3.16-.42-4.69H24v8.87h12.66c-.54 2.91-2.18 5.38-4.64 7.04l7.22 5.59C43.46 36.29 46.5 30.63 46.5 24z"/>
          <path fill="#FBBC05" d="M10.54 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.98-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.22-5.59c-2.01 1.35-4.58 2.15-7.33 2.15-6.26 0-11.57-4.22-13.46-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Iniciar sesión con Google
      </button>
    </div>

    <p class="auth-link">
      ¿No tienes cuenta?
      <a routerLink="/register">Regístrate</a>
    </p>
  </section>
</main>
