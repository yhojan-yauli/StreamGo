<app-navbar-public [showAuthButtons]="false"></app-navbar-public>

<main class="auth-page">
  <img src="/logo.png" class="logo-auth" alt="StreamGO">

  <section class="auth-box">
    <h1>Crear Cuenta</h1>

    <form (ngSubmit)="register()">
      <label>Nombre</label>
      <input type="text" [(ngModel)]="nombre" name="nombre" placeholder="Tu nombre" required>

      <label>Correo</label>
      <input type="email" [(ngModel)]="email" name="email" placeholder="usuario@gmail.com" required>

      <label>Contraseña</label>
      <input type="password" [(ngModel)]="password" name="password" placeholder="********" required>

      <button class="btn-morado" type="submit">Registrarse</button>
    </form>

    <button class="btn-google" type="button">🌐 Registrarse con Google</button>

    <p class="auth-link">
      ¿Ya tienes cuenta?
      <a routerLink="/login">Inicia sesión</a>
    </p>
  </section>
</main>
