<div class="auth-view">
  <app-navbar-public [showAuthButtons]="false"></app-navbar-public>
  <main class="auth-page">
    <img src="/logo.png" class="logo-auth" alt="StreamGO">

    <section class="auth-box">
      <div class="alert-box error" *ngIf="mensajeError">
        {{ mensajeError }}
      </div>

      <h1>Crear Cuenta</h1>
      <form [formGroup]="registerForm" (ngSubmit)="register()">
        <label>Nombre</label>
        <input type="text" formControlName="nombre"
               placeholder="Tu nombre"
               [class.input-error]="f['nombre'].invalid && f['nombre'].touched">
        <div class="field-error" *ngIf="f['nombre'].touched && f['nombre'].errors">
          <span *ngIf="f['nombre'].errors?.['required']">El nombre es requerido.</span>
          <span *ngIf="f['nombre'].errors?.['minlength']">Mínimo 2 caracteres.</span>
        </div>

        <label>Correo</label>
        <input type="email" formControlName="email"
               placeholder="usuario@gmail.com"
               [class.input-error]="f['email'].invalid && f['email'].touched">
        <div class="field-error" *ngIf="f['email'].touched && f['email'].errors">
          <span *ngIf="f['email'].errors?.['required']">El correo es requerido.</span>
          <span *ngIf="f['email'].errors?.['email']">Formato de correo inválido.</span>
        </div>

        <label>Contraseña</label>
        <input type="password" formControlName="password"
               placeholder="********"
               [class.input-error]="f['password'].invalid && f['password'].touched">
        <div class="field-error" *ngIf="f['password'].touched && f['password'].errors">
          <span *ngIf="f['password'].errors?.['required']">La contraseña es requerida.</span>
          <span *ngIf="f['password'].errors?.['minlength']">Mínimo 6 caracteres.</span>
        </div>

        <button class="sg-btn" type="submit">Registrarse</button>
      </form>

      <div class="oauth-container">
        <hr>
        <button class="btn-google" type="button" (click)="registerConGoogle()">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Registrarse con Google
        </button>
      </div>

      <p class="auth-link">
        ¿Ya tienes cuenta?
        <a routerLink="/login">Inicia sesión</a>
      </p>
    </section>
  </main>
</div>
