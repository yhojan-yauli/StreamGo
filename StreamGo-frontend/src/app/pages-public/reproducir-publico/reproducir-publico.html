<app-navbar-public></app-navbar-public>

<main class="public-player-page">
  <button class="btn-volver" type="button" onclick="history.back()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    Volver
  </button>

  <section class="public-player-layout">
    <div class="player-main">
      <app-video-player [videoUrl]="videoUrl" [titulo]="titulo()" [showAds]="true"></app-video-player>

      <div class="player-info">
        <h1>{{ titulo() }}</h1>
        <div class="player-meta">
          <span class="meta-cat">{{ contenido?.categoria || 'StreamGO' }}</span>
          <span class="meta-tipo">{{ contenido?.tipoContenido || 'Contenido' }}</span>
          <span class="meta-rating">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            {{ contenido?.promedioCalificacion || 0 }}
          </span>
          <span class="meta-repros">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/></svg>
            {{ contenido?.totalReproducciones || 0 }}
          </span>
        </div>
        <p class="desc">{{ descripcion() }}</p>
      </div>
    </div>

    <aside class="ads-right">
      <app-ad-banner [html]="ads[0]"></app-ad-banner>
      <app-ad-banner [html]="ads[1]"></app-ad-banner>
      <small>Publicidad</small>
    </aside>
  </section>
</main>
