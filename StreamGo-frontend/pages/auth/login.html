<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>StreamGO - Login</title>
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="../../css/auth.css">
</head>
<body>

<div class="auth-page">
    <img src="../../assets/imagenes/streamlogo.png" class="logo-auth">

    <div class="auth-box">
        <label>Email</label>
        <input type="email" id="email" placeholder="Admin@admin.go">

        <label>Password</label>
        <input type="password" id="password" placeholder="admin1234">

        <button class="btn-morado" onclick="login()">Iniciar Sesión</button>

        <button class="btn-google">🌐 Iniciar con Google</button>

        <br><br>

        <p style="font-size:12px;text-align:center;">
            ¿No tienes cuenta?
            <a href="registro.html">Regístrate</a>
        </p>
    </div>
</div>

<script src="../../js/app.js"></script>
</body>
</html>
