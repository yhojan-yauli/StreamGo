<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>StreamGO - Registro</title>
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="../../css/auth.css">
</head>
<body>

<div class="auth-page">
    <img src="../../assets/imagenes/streamlogo.png" class="logo-auth">

    <div class="auth-box">
        <label>Nombre</label>
        <input type="text" id="nombre" placeholder="ej. Juan">

        <label>Correo</label>
        <input type="email" id="email" placeholder="usuario@gmail.com">

        <label>Contraseña</label>
        <input type="password" id="password" placeholder="********">

        <button class="btn-morado" onclick="registrar()">Registrar</button>

        <button class="btn-google">🌐 Registrarse con Google</button>
    </div>
</div>

<script src="../../js/app.js"></script>
</body>
</html>
