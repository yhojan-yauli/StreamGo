<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamGO</title>

    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="../../css/public.css">
</head>
<body>

<main class="landing-page">

    <section class="landing-floating">
        <div class="landing-s-shape"></div>

        <div class="landing-posters">
            <img src="https://image.tmdb.org/t/p/w500/kyeqWdyUXW608qlYkRqosgbbJyK.jpg" alt="poster">
            <img src="https://image.tmdb.org/t/p/w500/8cdWjvZQUExUUTzyp4t6EDMubfO.jpg" alt="poster">
            <img src="https://image.tmdb.org/t/p/w500/9xjZS2rlVxm8SFx8kPC3aIGCOYQ.jpg" alt="poster">
            <img src="https://image.tmdb.org/t/p/w500/4YZpsylmjHbqeWzjKpUEF8gcLNW.jpg" alt="poster">
            <img src="https://image.tmdb.org/t/p/w500/2k9tBql5GYH328Krj66tDT9LtFZ.jpg" alt="poster">
        </div>
    </section>

    <section class="landing-center">
        <img src="../../assets/imagenes/streamlogo.png" class="landing-logo" alt="StreamGO">

        <button onclick="location.href='explorar.html'" class="landing-ver-btn">
            Ver Ahora
        </button>
    </section>

    <section class="landing-right">
        <img 
            class="landing-banner" 
            src="https://image.tmdb.org/t/p/w780/kyeqWdyUXW608qlYkRqosgbbJyK.jpg" 
            alt="banner"
        >

        <div class="landing-go-box">
            <span class="landing-g">G</span>
            <span class="landing-o">O</span>
            <span class="landing-q">?</span>
        </div>

        <div class="landing-buttons">
            <button onclick="location.href='../auth/login.html'" class="landing-login">
                Iniciar Sesión
            </button>

            <button onclick="location.href='../auth/registro.html'" class="landing-register">
                Registrarse
            </button>
        </div>

        <p class="landing-text">
            Peliculas, series y documentales al alcance <br>
            de tu mano. Empieza a ver hoy.
        </p>
    </section>

</main>

<script src="../../js/public.js"></script>
</body>
</html>
