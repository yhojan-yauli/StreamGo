<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Plan personalizado</title>
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="../../css/cliente.css">
</head>
<body>

<div id="navbar-container"></div>

<main class="planes-page">

    <h1>Adquiere tu plan personalizado...</h1>

    <div style="display:grid;grid-template-columns:1fr 1.4fr;gap:70px;align-items:center;">

        <img src="../../assets/imagenes/streamlogo.png" style="width:500px;max-width:100%;">

        <section class="plan-card" style="width:100%;min-height:auto;">
            <h2>Crea Tu Experiencia</h2>

            <p>Tú decides cuánto tiempo quieres disfrutar.</p>

            <br>

            <label>Ingresa tu monto</label>
            <input style="width:100%;padding:12px;margin:10px 0;" type="number" placeholder="S/">

            <label>Tiempo estimado de acceso</label>
            <input style="width:100%;padding:12px;margin:10px 0;" type="text" placeholder="5 horas...">

            <p>
                Beneficios incluidos <br>
                ✅ Acceso al catálogo básico <br>
                ✅ Calidad HD <br>
                ✅ Perfil personalizado <br>
                ✅ Recomendaciones IA
            </p>

            <br>

            <p>☑ I accept the terms</p>

            <br>

            <button>Activar mi acceso</button>
        </section>

    </div>

</main>

<script src="../../js/app.js"></script>
</body>
</html>
