<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - Contenido</title>
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="../../css/admin.css">
</head>
<body>

<div class="admin-layout">

    <div id="sidebar-container"></div>

    <main class="admin-content">

        <div class="admin-top">Administrador 🟢</div>

        <img src="../../assets/imagenes/streamlogo.png" style="width:300px;display:block;margin:0 auto 30px;">

        <section class="contenido-admin-grid">

            <div>
                <h1 style="font-size:46px;margin-bottom:70px;">Agregar contenido</h1>

                <div class="form-admin">

                    <label>Nombre</label>
                    <input id="titulo" type="text" placeholder="Nombre de película ########">

                    <label>Fecha de publicación</label>
                    <input id="fechaEstreno" type="date">

                    <label>Categoría</label>
                    <input id="categoria" type="text" placeholder="Documental">

                    <label>Sinopsis</label>
                    <textarea id="descripcion" rows="4"></textarea>

                    <label>Imagen URL</label>
                    <input id="imagenUrl" type="text">

                    <label>Contenido Multimedia / URL</label>
                    <input id="videoUrl" type="text">

                    <button onclick="agregarContenidoAdmin()">Subir Contenido</button>

                </div>
            </div>

            <div>
                <h1 style="font-size:46px;margin-bottom:40px;">Contenido Agregado</h1>

                <div class="lista-contenido-admin">

                    <input class="search-admin" type="text" placeholder="Buscar">

                    <div id="listaContenidoAdmin">
                        <div class="item-contenido-admin">
                            <img src="../../assets/imagenes/background.png">
                            <span>Nombre Película ############</span>
                            <button>Editar</button>
                            <span class="info-icon">i</span>
                        </div>
                    </div>

                </div>
            </div>

        </section>

    </main>

</div>

<script src="../../js/app.js"></script>
<script src="../../js/admin.js"></script>
</body>
</html>
