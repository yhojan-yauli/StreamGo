<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - Preferidos</title>
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="../../css/admin.css">
</head>
<body>

<div class="admin-layout">

    <div id="sidebar-container"></div>

    <main class="admin-content">

        <h1 class="titulo-admin">Lista de preferidos</h1>

        <section class="preferidos-admin-box">

            <label>Nombre</label>
            <input type="text" placeholder="Nombre de película ########">

            <label>Fecha de publicación</label>
            <input type="text" placeholder="2026/5/12">

            <label>Categoría</label>
            <input type="text" placeholder="Documental">

            <label>Sinopsis</label>
            <textarea rows="4"></textarea>

            <button>Agregar a la lista</button>

        </section>

    </main>

</div>

<script src="../../js/app.js"></script>
</body>
</html>
